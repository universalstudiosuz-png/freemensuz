<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Елена Урлаева - Блог</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; display: flex; gap: 30px; }
        .main-content { flex: 2; }
        .post-card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .post-card img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 5px; }
        .sidebar { flex: 1; background: #fff; padding: 20px; border-radius: 10px; height: fit-content; border: 1px solid #ddd; }
        h1 { color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-content">
        <h1>Новости Елены Урлаевой</h1>
        <div id="postsList">Загрузка данных...</div>
    </div>

    <aside class="sidebar">
        <h3>О правозащитнике</h3>
        <p>Елена Урлаева — правозащитник. На этой странице собраны все её отчёты и материалы.</p>
        <hr>
        <a href="index.html">Вернуться на главную</a>
    </aside>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://freemans-4597e-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const list = document.getElementById('postsList');

    // Базадан 'posts/urlaeva' маълумотларини ўқиш
    db.ref('posts/urlaeva').on('value', (snapshot) => {
        list.innerHTML = ''; // Тозалаш
        
        if (!snapshot.exists()) {
            list.innerHTML = "<p>Материалов пока нет.</p>";
            return;
        }

        snapshot.forEach(child => {
            const p = child.val();
            const div = document.createElement('div');
            div.className = 'post-card';
            div.innerHTML = `
                ${p.image ? `<img src="${p.image}">` : ''}
                <h2>${p.title}</h2>
                <p>${p.text}</p>
            `;
            list.appendChild(div);
        });
    });
</script>
</body>
</html>
