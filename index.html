<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>I Want Freedom</title>
    <style>

 
    /* Асосий меню контейнери */
    .dropdown { position: relative; display: inline-block; }
    
    /* "Monitoring" менюси ёзуви */
    .dropbtn { 
        color: gold; font-weight: bold; cursor: pointer; font-size: 16px; 
        text-decoration: none; padding: 10px;
    }
    
    /* Дропдавн мазмуни (дастлаб яширин) */
    .dropdown-content {
        display: none;
        position: absolute;
        background-color: #f9f9f9;
        min-width: 160px;
        box-shadow: 0px 8px 16px rgba(0,0,0,0.2);
        z-index: 1;
        border-radius: 5px;
    }
    
    /* Дропдавн ҳаволалари */
    .dropdown-content a {
        color: black;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
    }
    
    .dropdown-content a:hover { background-color: #ddd; }
    
    /* Сичқонча борганда очиш */
    .dropdown:hover .dropdown-content { display: block; }
 
        /* Асосий дизайн */
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f0f2f5; }
        header { background: #24724b; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Логотип дизайни */
        .free img {
            border-radius: 50%;
            border: 3px solid red;
            box-shadow: 3px 5px 8px rgba(0,0,0,0.3);
        }
        
        /* Меню дизайни */
        .menu-btn { display: flex; gap: 15px; }
        .menu-btn a {
            text-decoration: none;
            font-size: 16px;
            color: black;
            font-weight: bold;
        }
        
        /* Admin тугмаси */
        .admin-btn {
            background: #ea6903;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        /* Тил алмаштириш */
        [data-lang="ru"] { display: none; }
    </style>
</head>
<body>

<header>
    <div class="free">
        <img src="logo.jpg" alt="log" width="100" height="100">
    </div>

    <div>
        <h1 data-lang="en">I Want Freedom</h1>
        <h1 data-lang="ru">Я Хочу Свободу</h1>
    </div>

 

<nav class="menu-btn">
    <div class="dropdown">
        <a href="#" class="dropbtn">Monitoring ▼</a>
        <div class="dropdown-content">
            <a href="template.html">Elena Urlaeva</a>
            <a href="template.html">Tatyana Davlatova</a>
            <a href="template.html">Nick Noland</a>
        </div>
    </div>
</nav>
    
    <div>
        <button onclick="switchLang('en')">EN</button>
        <button onclick="switchLang('ru')">RU</button>
        <a href="admin.html" class="admin-btn">Admin</a>
    </div>
</header>

<script>
    function switchLang(lang) {
        document.querySelectorAll('[data-lang]').forEach(el => {
            el.style.display = (el.getAttribute('data-lang') === lang) ? 'block' : 'none';
        });
    }
    function doGet(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var rows = sheet.getDataRange().getValues();
  var category = e.parameter.category;
  
  // Энг охирги қаторни топиш
  var lastRow = rows[rows.length - 1]; 
  
  var result = {
    title: lastRow[1], // Сарлавҳа устуни
    text: lastRow[2]    // Матн устуни
  };
  
  return ContentService.createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var data = JSON.parse(e.postData.contents);
  sheet.appendRow([data.category, data.title, data.content]);
  return ContentService.createTextOutput("Success");
}
</script>

</body>
</html>
