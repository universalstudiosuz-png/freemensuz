<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>I Want Freedom</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background: #f0f2f5; }
        header { background: #24724b; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Меню дизайни */
        .dropdown { position: relative; display: inline-block; }
        .dropbtn { color: white; font-weight: bold; cursor: pointer; text-decoration: none; padding: 10px; border: 1px solid white; border-radius: 5px; }
        .dropdown-content { display: none; position: absolute; background: white; min-width: 160px; box-shadow: 0px 8px 16px rgba(0,0,0,0.2); z-index: 100; }
        .dropdown-content a { color: black; padding: 12px; text-decoration: none; display: block; }
        .dropdown-content a:hover { background: #f1f1f1; }
        .dropdown:hover .dropdown-content { display: block; }

        .main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 350px)); justify-content: center; gap: 20px; padding: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .card img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .card-body { padding: 15px; flex-grow: 1; }
        .card h4 { margin: 0 0 10px 0; font-size: 16px; color: #333; }
        .card a { color: #ea6903; font-weight: bold; text-decoration: none; }
        .admin-btn { background: #ea6903; color: white; padding: 8px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" alt="logo" width="60" style="border-radius:50%;">
    <h1>I Want Freedom</h1>
    
    <nav>
        <div class="dropdown">
            <a href="#" class="dropbtn">Monitoring ▼</a>
            <div class="dropdown-content">
                <a href="urlaeva.html">Elena Urlaeva</a>
                <a href="davlatova.html">Tatyana Davlatova</a>
                <a href="noland.html">Nick Noland</a>
            </div>
        </div>
    </nav>
    
    <a href="admin.html" class="admin-btn">Admin</a>
</header>

<div class="main-grid" id="mainGrid"></div>

<script>
    const firebaseConfig = { databaseURL: "https://freemans-4597e-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const grid = document.getElementById('mainGrid');
    const categories = ['urlaeva', 'davlatova', 'noland'];

    // Маълумотларни базадан олиш
    function render() {
        grid.innerHTML = ''; 
        categories.forEach(cat => {
            db.ref('posts/' + cat).once('value', (snapshot) => {
                snapshot.forEach(c => {
                    const p = c.val();
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        ${p.image ? `<img src="${p.image}">` : ''}
                        <div class="card-body">
                            <h4>${p.title}</h4>
                            <a href="${cat}.html">Ўтиш</a>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            });
        });
    }

    // База ўзгарса, автоматик янгилаш
    categories.forEach(cat => {
        db.ref('posts/' + cat).on('value', render);
    });
</script>
</body>
</html>
