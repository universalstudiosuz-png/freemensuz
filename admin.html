<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - I Want Freedom</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; }
        button { background: #ea6903; color: white; padding: 10px; border: none; cursor: pointer; margin: 5px; }
        .post-item { border-bottom: 1px solid #ddd; padding: 15px; }
        #adminSection { display: none; }
        .edit-area { background: #f9f9f9; padding: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
<div class="container">
    <div id="loginSection">
        <h2>🔒 Тизимга кириш</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Парол">
        <button onclick="checkLogin()">КИРИШ</button>
    </div>

    <div id="adminSection">
        <a href="index.html">⬅️ Главная страница</a>
        <h2>✍️ Маълумот қўшиш</h2>
        <select id="category" onchange="loadPosts()">
            <option value="urlaeva">Елена Урлаева</option>
            <option value="davlatova">Давлатова</option>
            <option value="noland">Ник Ноланд</option>
        </select>
        <input type="text" id="title" placeholder="Сарлавҳа...">
        <textarea id="text" placeholder="Матн..."></textarea>
        <button onclick="saveData()">САЙТГА ЖЎНАТИШ</button>
        <button style="background:gray;" onclick="location.reload()">ЧИҚИШ</button>
        <hr>
        <div id="postsList"></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://freemans-4597e-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkLogin() {
        if(document.getElementById('email').value === "nicknoil@protonmail.com" && document.getElementById('password').value === "Unitedpirs") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            loadPosts();
        } else { alert("Хато!"); }
    }

    function saveData() {
        const cat = document.getElementById('category').value;
        const title = document.getElementById('title').value;
        const text = document.getElementById('text').value;
        if(!title || !text) return alert("Маълумотларни тўлдиринг!");
        db.ref('posts/' + cat).push({ title, text });
        alert("Сақланди!");
        document.getElementById('title').value = '';
        document.getElementById('text').value = '';
        loadPosts();
    }

    function loadPosts() {
        const cat = document.getElementById('category').value;
        const list = document.getElementById('postsList');
        db.ref('posts/' + cat).on('value', (s) => {
            list.innerHTML = '';
            s.forEach(c => {
                const p = c.val();
                const id = c.key;
                const div = document.createElement('div');
                div.className = 'post-item';
                div.innerHTML = `
                    <strong>${p.title}</strong><br>
                    <button onclick="document.getElementById('edit-${id}').style.display='block'">Таҳрирлаш</button>
                    <button style="background:red;" onclick="deletePost('${cat}', '${id}')">Ўчириш</button>
                    <div id="edit-${id}" class="edit-area">
                        <input type="text" id="newTitle-${id}" value="${p.title.replace(/"/g, '&quot;')}">
                        <textarea id="newText-${id}">${p.text}</textarea>
                        <button onclick="updatePost('${cat}', '${id}')">Сақлаш</button>
                    </div>
                `;
                list.appendChild(div);
            });
        });
    }

    function updatePost(cat, id) {
        const title = document.getElementById('newTitle-' + id).value;
        const text = document.getElementById('newText-' + id).value;
        db.ref('posts/' + cat + '/' + id).update({ title, text });
        alert("Янгиланди!");
    }

    function deletePost(cat, id) { if(confirm("Ўчирасизми?")) db.ref('posts/' + cat + '/' + id).remove(); }
</script>
</body>
</html>
