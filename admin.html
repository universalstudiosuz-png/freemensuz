<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - I Want Freedom</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        body { background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .admin-card { background: white; width: 500px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: #ea6903; color: white; width: 100%; padding: 10px; border: none; cursor: pointer; }
        #appContent { display: none; }
        .post-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="admin-card">
    <div id="loginSection">
        <h2>🔒 КИРИШ</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Парол">
        <button class="btn" onclick="checkLogin()">КИРИШ</button>
    </div>

    <div id="appContent">
        <h2>✍️ МАЪЛУМОТЛАРНИ БОШҚАРИШ</h2>
        <input type="text" id="title" placeholder="Сарлавҳа...">
        <textarea id="text" placeholder="Матн..."></textarea>
        <button class="btn" onclick="saveData()">ҚЎШИШ</button>
        <div id="postList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCBwgzIw9TOFGLi3F80z9jOh6vIQhI8QBA",
        databaseURL: "https://freemans-4597e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "freemans-4597e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Парол текшируви
    function checkLogin() {
        if(document.getElementById('email').value === "nicknoil@protonmail.com" && 
           document.getElementById('password').value === "Unitedpirs") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            loadPosts();
        } else { alert("Парол нотўғри!"); }
    }

    // Рўйхатни чиқариш
    function loadPosts() {
        db.ref('posts/news').on('value', (snapshot) => {
            const list = document.getElementById('postList');
            list.innerHTML = '';
            snapshot.forEach((child) => {
                list.innerHTML += `
                    <div class="post-item">
                        <span>${child.val().title}</span>
                        <button onclick="deletePost('${child.key}')" style="background:red; color:white;">Ўчириш</button>
                    </div>`;
            });
        });
    }

    window.deletePost = (id) => { if(confirm("Ўчирасизми?")) db.ref('posts/news/' + id).remove(); };
    window.saveData = () => {
        const t = document.getElementById('title').value;
        const x = document.getElementById('text').value;
        db.ref('posts/news').push({ title: t, text: x });
        alert("Қўшилди!");
    };
</script>
</body>
</html>
