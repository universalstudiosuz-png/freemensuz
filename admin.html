<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - I Want Freedom</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        body { background: #f0f2f5; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .admin-card { background: white; width: 500px; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: #ea6903; color: white; width: 48%; padding: 10px; border: none; cursor: pointer; }
        #appContent { display: none; }
        .post-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="admin-card">
    <div id="loginSection">
        <h2>🔒 КИРИШ</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Парол">
        <button class="btn" style="width:100%" onclick="checkLogin()">КИРИШ</button>
    </div>

    <div id="appContent">
        <div style="display:flex; justify-content:space-between;">
            <h2>✍️ БОШҚАРУВ</h2>
            <button onclick="location.reload()" style="background:gray; color:white; border:none; cursor:pointer;">Чиқиш</button>
        </div>
        <input type="hidden" id="editId">
        <input type="text" id="title" placeholder="Сарлавҳа...">
        <textarea id="text" placeholder="Матн..."></textarea>
        <button class="btn" id="saveBtn" onclick="saveData()">ҚЎШИШ</button>
        <div id="postList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCBwgzIw9TOFGLi3F80z9jOh6vIQhI8QBA",
        databaseURL: "https://freemans-4597e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "freemans-4597e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkLogin() {
        if(document.getElementById('email').value === "nicknoil@protonmail.com" && 
           document.getElementById('password').value === "Unitedpirs") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            loadPosts();
        } else { alert("Парол нотўғри!"); }
    }

    function loadPosts() {
        db.ref('posts/news').on('value', (snapshot) => {
            const list = document.getElementById('postList');
            list.innerHTML = '';
            snapshot.forEach((child) => {
                list.innerHTML += `
                    <div class="post-item">
                        <span>${child.val().title}</span>
                        <div>
                            <button onclick="editPost('${child.key}', '${child.val().title}', '${child.val().text}')">Таҳрир</button>
                            <button onclick="deletePost('${child.key}')" style="background:red; color:white;">Ўчириш</button>
                        </div>
                    </div>`;
            });
        });
    }

    window.editPost = (id, title, text) => {
        document.getElementById('editId').value = id;
        document.getElementById('title').value = title;
        document.getElementById('text').value = text;
        document.getElementById('saveBtn').innerText = "Янгилаш";
    };

    window.saveData = () => {
        const id = document.getElementById('editId').value;
        const data = { title: document.getElementById('title').value, text: document.getElementById('text').value };
        if(id) {
            db.ref('posts/news/' + id).update(data);
            document.getElementById('saveBtn').innerText = "ҚЎШИШ";
            document.getElementById('editId').value = '';
        } else {
            db.ref('posts/news').push(data);
        }
        document.getElementById('title').value = '';
        document.getElementById('text').value = '';
    };

    window.deletePost = (id) => { if(confirm("Ўчирасизми?")) db.ref('posts/news/' + id).remove(); };
</script>
</body>
</html>
