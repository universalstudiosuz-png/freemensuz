 <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Professional Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        .container { max-width: 800px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: var(--primary); color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-delete { background: #e74c3c; }
        .post-card { border: 1px solid #eee; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; align-items: center; }
        .post-img { width: 80px; height: 80px; object-fit: cover; margin-right: 15px; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="loginSection">
        <h2>🔒 Тизимга кириш</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Парол">
        <button onclick="checkLogin()">Кириш</button>
    </div>

    <div id="adminContent" style="display:none;">
        <div class="header">
            <h2>✍️ Маълумотларни бошқариш</h2>
            <button onclick="location.reload()" class="btn-delete">Чиқиш</button>
        </div>
        <input type="hidden" id="editId">
        <input type="text" id="title" placeholder="Сарлавҳа...">
        <textarea id="text" placeholder="Матн..."></textarea>
        <input type="file" id="imgFile" accept="image/*">
        <button id="saveBtn" onclick="saveData()">Сақлаш</button>
        <div id="postList"></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://freemans-4597e-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkLogin() {
        if(document.getElementById('email').value === "nicknoil@protonmail.com" && 
           document.getElementById('password').value === "Unitedpirs") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            loadPosts();
        } else alert("Хато!");
    }

    // Расмни Base64 га ўгириш (CORS муаммосини ечиш учун)
    const toBase64 = file => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    async function saveData() {
        const file = document.getElementById('imgFile').files[0];
        const data = {
            title: document.getElementById('title').value,
            text: document.getElementById('text').value,
            image: file ? await toBase64(file) : ""
        };
        const id = document.getElementById('editId').value;
        id ? db.ref('posts/news/' + id).update(data) : db.ref('posts/news').push(data);
        alert("Бажарилди!");
    }

    function loadPosts() {
        db.ref('posts/news').on('value', (s) => {
            let html = '';
            s.forEach(c => {
                const p = c.val();
                html += `<div class="post-card">
                    <img src="${p.image}" class="post-img">
                    <div>
                        <h3>${p.title}</h3>
                        <button onclick="editPost('${c.key}', '${p.title}', '${p.text}')">Таҳрир</button>
                        <button onclick="db.ref('posts/news/${c.key}').remove()" class="btn-delete">Ўчириш</button>
                    </div>
                </div>`;
            });
            document.getElementById('postList').innerHTML = html;
        });
    }

    function editPost(id, t, txt) {
        document.getElementById('editId').value = id;
        document.getElementById('title').value = t;
        document.getElementById('text').value = txt;
        document.getElementById('saveBtn').innerText = "Янгилаш";
    }
</script>
</body>
</html>
