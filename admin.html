<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - I Want Freedom</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCBwgzIw9TOFGLi3F80z9jOh6vIQhI8QBA",
            databaseURL: "https://freemans-4597e-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "freemans-4597e.appspot.com",
            projectId: "freemans-4597e"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const storage = firebase.storage();

        function checkLogin() {
            if(document.getElementById('email').value === "nicknoil@protonmail.com" && 
               document.getElementById('password').value === "Unitedpirs") {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('contentForm').style.display = 'block';
            } else { alert("Парол нотўғри!"); }
        }

        async function saveData() {
            const category = document.getElementById('category').value;
            const title = document.getElementById('title').value;
            const text = document.getElementById('text').value;
            const file = document.getElementById('imageInput').files[0];

            if (!file) { alert("Илтимос, расм танланг!"); return; }

            try {
                // 1. Расмни юклаш
                const storageRef = storage.ref('images/' + Date.now() + file.name);
                await storageRef.put(file);
                const imageUrl = await storageRef.getDownloadURL();

                // 2. Базага ёзиш
                await db.ref('posts/' + category).push({
                    title: title,
                    text: text,
                    imageUrl: imageUrl,
                    date: new Date().toLocaleDateString()
                });
                
                alert("Муваффақиятли сақланди!");
            } catch (err) {
                console.error("Хатолик:", err);
                alert("Хатолик: " + err.message);
            }
        }
    </script>
</head>
<body>
    <div id="loginForm">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Парол">
        <button onclick="checkLogin()">КИРИШ</button>
    </div>

    <div id="contentForm" style="display:none;">
        <select id="category">
            <option value="news">Новости</option>
            <option value="research">Исследования</option>
        </select>
        <input type="text" id="title" placeholder="Сарлавҳа...">
        <textarea id="text" placeholder="Матн..."></textarea>
        <input type="file" id="imageInput">
        <button onclick="saveData()">САЙТГА ЖЎНАТИШ</button>
    </div>
</body>
</html>
