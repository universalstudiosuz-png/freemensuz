 <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Professional Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        .container { max-width: 800px; margin: 50px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: var(--primary); color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .btn-delete { background: #e74c3c; }
        .post-card { border: 1px solid #eee; padding: 15px; margin: 10px 0; border-radius: 8px; display: flex; align-items: center; }
        .post-img { width: 80px; height: 80px; object-fit: cover; margin-right: 15px; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div id="loginSection">
        <h2>🔒 Тизимга кириш</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Парол">
        <button onclick="checkLogin()">Кириш</button>
    </div>

 <select id="category">
    <option value="urlaeva">Елена Урлаева</option>
    <option value="davlatova">Давлатова</option>
    <option value="noland">Ник Ноланд</option>
</select>

<script>
    window.saveData = async () => {
        const cat = document.getElementById('category').value; // Танланган шахс
        const file = document.getElementById('imgFile').files[0];
        const data = {
            title: document.getElementById('title').value,
            text: document.getElementById('text').value,
            image: file ? await toBase64(file) : "",
            date: new Date().toLocaleDateString()
        };
        // Танланган категорияга сақлаш
        db.ref('posts/' + cat).push(data);
        alert("Сақланди!");
    };
</script>
</body>
</html>
