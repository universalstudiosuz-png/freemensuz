<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - I Want Freedom</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        input, textarea, select { width: 100%; padding: 10px; margin: 5px 0; }
        button { background: #ea6903; color: white; padding: 10px; border: none; cursor: pointer; margin: 5px; }
        .post-item { border-bottom: 1px solid #ddd; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
        #adminSection { display: none; }
        .loginSection a{
            text-align: center;
            text-decoration: solid;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 16px;
            color: red;
        }
        .adminSection a{
              text-align: center;
            text-decoration: solid;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 16px;
            color: red;
        }
    </style>
</head>
<body>
<div class="container">
    <div id="loginSection">
        <h2>🔒 Тизимга кириш</h2>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Парол">
        <button onclick="checkLogin()">КИРИШ</button><br>
        <a href="index.html" class="btn"> Главная страница</a>
    </div>

    <div id="adminSection">
        <a href="index.html" class="btn"> выход</a>
        <h2>✍️ Маълумот қўшиш</h2>
        <select id="category" onchange="loadPosts()">
            <option value="urlaeva">Елена Урлаева</option>
            <option value="davlatova">Давлатова</option>
            <option value="noland">Ник Ноланд</option>
        </select>
        <input type="text" id="title" placeholder="Сарлавҳа...">
        <textarea id="text" placeholder="Матн..."></textarea>
        <button onclick="saveData()">САЙТГА ЖЎНАТИШ</button>
        <button style="background:gray;" onclick="location.reload()">ЧИҚИШ (LOGOUT)</button>
        <hr>
        <div id="postsList"></div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://freemans-4597e-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkLogin() {
        if(document.getElementById('email').value === "nicknoil@protonmail.com" && document.getElementById('password').value === "Unitedpirs") {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminSection').style.display = 'block';
            loadPosts();
        } else { alert("Хато!"); }
    }

    function saveData() {
        const cat = document.getElementById('category').value;
        const title = document.getElementById('title').value;
        const text = document.getElementById('text').value;
        db.ref('posts/' + cat).push({ title, text });
        alert("Сақланди!");
        loadPosts();
    }

    function loadPosts() {
        const cat = document.getElementById('category').value;
        const list = document.getElementById('postsList');
        list.innerHTML = '';
        db.ref('posts/' + cat).on('value', (s) => {
            list.innerHTML = '';
            s.forEach(c => {
                const p = c.val();
                list.innerHTML += `<div class="post-item">
                    <span>${p.title}</span>
                    <div>
                        <button onclick="editPost('${cat}', '${c.key}', '${p.title}', '${p.text}')">Таҳрирлаш</button>
                        <button style="background:red;" onclick="deletePost('${cat}', '${c.key}')">Ўчириш</button>
                    </div>
                </div>`;
            });
        });
    }

    function editPost(cat, id, oldTitle, oldText) {
        const newTitle = prompt("Янги сарлавҳа:", oldTitle);
        const newText = prompt("Янги матн:", oldText);
        if(newTitle && newText) db.ref('posts/' + cat + '/' + id).update({ title: newTitle, text: newText });
    }

    function deletePost(cat, id) { if(confirm("Ўчирасизми?")) db.ref('posts/' + cat + '/' + id).remove(); }
</script>
</body>
</html>
