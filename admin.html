<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .post-item { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="loginForm">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Парол">
    <button onclick="checkLogin()">Кириш</button>
</div>

<div id="adminPanel" style="display:none;">
    <input type="hidden" id="editId">
    <input type="text" id="title" placeholder="Сарлавҳа">
    <textarea id="text" placeholder="Матн"></textarea>
    <button id="saveBtn" onclick="saveData()">Қўшиш</button>
    <div id="postList"></div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://freemans-4597e-default-rtdb.europe-west1.firebasedatabase.app"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function checkLogin() {
        if(document.getElementById('email').value === "nicknoil@protonmail.com" && 
           document.getElementById('password').value === "Unitedpirs") {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadPosts();
        } else { alert("Парол нотўғри!"); }
    }

    function loadPosts() {
        db.ref('posts/news').on('value', (snapshot) => {
            const list = document.getElementById('postList');
            list.innerHTML = '';
            snapshot.forEach((child) => {
                list.innerHTML += `<div class="post-item">
                    ${child.val().title} 
                    <button onclick="editPost('${child.key}', '${child.val().title}', '${child.val().text}')">Таҳрир</button>
                    <button onclick="deletePost('${child.key}')">Ўчириш</button>
                </div>`;
            });
        });
    }

    window.saveData = () => {
        const id = document.getElementById('editId').value;
        const title = document.getElementById('title').value;
        const text = document.getElementById('text').value;
        if(id) {
            db.ref('posts/news/' + id).update({ title, text });
            document.getElementById('editId').value = '';
            document.getElementById('saveBtn').innerText = "Қўшиш";
        } else {
            db.ref('posts/news').push({ title, text });
        }
    };

    window.editPost = (id, title, text) => {
        document.getElementById('editId').value = id;
        document.getElementById('title').value = title;
        document.getElementById('text').value = text;
        document.getElementById('saveBtn').innerText = "Янгилаш";
    };

    window.deletePost = (id) => db.ref('posts/news/' + id).remove();
</script>
</body>
</html>
