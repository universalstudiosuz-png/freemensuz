<!DOCTYPE html>
<html>
<head>
    <title>Profile Page</title>
</head>
<body>
    <div id="content">
        <h1 id="title">Loading...</h1>
        <img id="profileImage" src="" width="300">
        <p id="description"></p>
    </div>

    <script>
        // Бу скрипт Google Sheets дан маълумотни олиб келади
        async function loadData(category) {
            const response = await fetch('YOUR_GOOGLE_APPS_SCRIPT_URL?category=' + category);
            const data = await response.json();
            document.getElementById('title').innerText = data.title;
            document.getElementById('description').innerText = data.text;
            document.getElementById('profileImage').src = data.imageUrl;
        }
    </script>
</body>
</html>
