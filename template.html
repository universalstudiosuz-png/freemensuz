<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Profile Page</title>
</head>
<body>
    <div id="content">
        <h1 id="title">Юкланмоқда...</h1>
        <p id="description"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
        import { getDatabase, ref, query, limitToLast, onValue } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

   const firebaseConfig = {
    apiKey: "AIzaSyCBwgzIw9TOFGLi3F80z9jOh6vIQhI8QBA",
    authDomain: "freemans-4597e.firebaseapp.com",
    projectId: "freemans-4597e",
    // Энг муҳими мана шу линк:
   databaseURL: "https://freemans-4597e-default-rtdb.europe-west1.firebasedatabase.app",
    storageBucket: "freemans-4597e.firebasestorage.app",
    messagingSenderId: "370678285596",
    appId: "1:370678285596:web:a7232e47353305324466d9"
};
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const category = new URLSearchParams(window.location.search).get('category') || 'news';
        const postRef = query(ref(db, 'posts/' + category), limitToLast(1));

        onValue(postRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const key = Object.keys(data)[0];
                const post = data[key];
                document.getElementById('title').innerText = post.title;
                document.getElementById('description').innerText = post.text;
            } else {
                document.getElementById('title').innerText = "Маълумот топилмади.";
            }
        });
    </script>
</body>
</html>
